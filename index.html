<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskSet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 14px;
            color: #fff;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #555; }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }

        .btn-primary {
            background: #fff;
            color: #000;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid #333;
            color: #666;
            width: auto;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
        }

        .btn-danger:hover { border-color: #ff4444; color: #ff4444; opacity: 1; }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #222;
        }

        .todo-item:last-child { border-bottom: none; }

        .todo-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .todo-title {
            font-size: 15px;
            color: #fff;
        }

        .todo-title.done {
            text-decoration: line-through;
            color: #444;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .checkbox.checked {
            background: #fff;
            border-color: #fff;
        }

        .checkbox.checked::after {
            content: '✓';
            color: #000;
            font-size: 12px;
            font-weight: 700;
        }

        .add-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .add-row input {
            margin-bottom: 0;
            flex: 1;
        }

        .btn-add {
            width: auto;
            padding: 12px 20px;
            background: #fff;
            color: #000;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .error {
            color: #ff4444;
            font-size: 13px;
            margin-top: 8px;
        }

        #app { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>TaskSet</h1>
    <p class="subtitle">Your personal task manager</p>

    <!-- Login -->
    <!-- Login / Register -->
<div id="auth">
    <div class="card">
        <div id="form-title" style="font-size:18px; font-weight:600; margin-bottom:20px">Sign in</div>
        
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username">
        
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
        
        <div id="confirm-block" style="display:none">
            <label>Confirm password</label>
            <input type="password" id="confirm-password" placeholder="Repeat password">
        </div>

        <button class="btn-primary" id="main-btn" onclick="handleSubmit()">Sign in</button>
        <p class="error" id="auth-error"></p>
    </div>

    <p style="text-align:center; color:#444; font-size:13px; margin-top:12px" id="switch-text">
        Don't have an account? 
        <span id="switch-btn" onclick="switchMode()" style="color:#fff; cursor:pointer; text-decoration:underline">Register</span>
    </p>
</div>

    <!-- App -->
    <div id="app">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
            <p style="color:#666; font-size:14px">Logged in as <span id="username-display" style="color:#fff"></span></p>
            <button onclick="logout()" style="width:auto; padding:6px 14px; background:transparent; border:1px solid #333; color:#666; border-radius:6px; font-size:13px">Logout</button>
        </div>

        <div class="card">
            <div id="todo-list"></div>
            <div class="add-row">
                <input type="text" id="new-task" placeholder="Add a task..." onkeydown="if(event.key==='Enter') addTodo()">
                <button class="btn-add" onclick="addTodo()">Add</button>
            </div>
        </div>
    </div>
</div>

<script>

const API = window.location.port === '5500' ? 'http://localhost:8000' : '';
let token = localStorage.getItem('token');
let currentUser = localStorage.getItem('username');
let isRegisterMode = false;

if (token) showApp();

function switchMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('form-title').textContent = isRegisterMode ? 'Register' : 'Sign in';
    document.getElementById('main-btn').textContent = isRegisterMode ? 'Register' : 'Sign in';
    document.getElementById('confirm-block').style.display = isRegisterMode ? 'block' : 'none';
    document.getElementById('auth-error').textContent = '';
    document.getElementById('switch-text').innerHTML = isRegisterMode 
        ? 'Already have an account? <span id="switch-btn" onclick="switchMode()" style="color:#fff; cursor:pointer; text-decoration:underline">Sign in</span>'
        : 'Don\'t have an account? <span id="switch-btn" onclick="switchMode()" style="color:#fff; cursor:pointer; text-decoration:underline">Register</span>';
}

function handleSubmit() {
    if (isRegisterMode) {
        register();
    } else {
        login();
    }
}

async function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const res = await fetch(`${API}/token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `username=${username}&password=${password}`
    });

    if (res.ok) {
        const data = await res.json();
        token = data.access_token;
        currentUser = username;
        localStorage.setItem('token', token);
        localStorage.setItem('username', username);
        showApp();
    } else {
        document.getElementById('auth-error').textContent = 'Wrong username or password';
    }
}

async function register() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (!username || !password) {
        document.getElementById('auth-error').textContent = 'Enter username and password';
        return;
    }

    if (password !== confirm) {
        document.getElementById('auth-error').textContent = 'Passwords do not match';
        return;
    }

    const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

    if (res.ok) {
        await login();
    } else {
        document.getElementById('auth-error').textContent = 'Username already taken';
    }
}

function logout() {
    token = null;
    localStorage.removeItem('token');
    localStorage.removeItem('username');
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth').style.display = 'block';
}

function showApp() {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('username-display').textContent = currentUser;
    loadTodos();
}

async function loadTodos() {
    const res = await fetch(`${API}/todos`, {
        headers: { 'Authorization': `Bearer ${token}` }
    });
    const todos = await res.json();
    renderTodos(todos);
}

function renderTodos(todos) {
    const list = document.getElementById('todo-list');
    if (todos.length === 0) {
        list.innerHTML = '<p style="color:#444; font-size:14px; padding:14px 0">No tasks yet. Add one!</p>';
        return;
    }
    list.innerHTML = todos.map(todo => `
        <div class="todo-item" data-id="${todo.id}" data-done="${todo.done}" data-title="${todo.title.replace(/"/g, '&quot;')}">
            <div class="todo-left">
                <div class="checkbox ${todo.done ? 'checked' : ''}" onclick="toggleTodo(this)"></div>
                <span class="todo-title ${todo.done ? 'done' : ''}">${todo.title}</span>
            </div>
            <button class="btn-danger" onclick="deleteTodo(this)">Delete</button>
        </div>
    `).join('');
}

async function addTodo() {
    const input = document.getElementById('new-task');
    const title = input.value.trim();
    if (!title) return;

    await fetch(`${API}/todos`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ title, done: false })
    });

    input.value = '';
    loadTodos();
}

async function toggleTodo(el) {
    const item = el.closest('.todo-item');
    const id = item.dataset.id;
    const done = item.dataset.done === 'true';
    const title = item.dataset.title;

    await fetch(`${API}/todos/${id}`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ title, done: !done })
    });
    loadTodos();
}

async function deleteTodo(el) {
    const id = el.closest('.todo-item').dataset.id;
    await fetch(`${API}/todos/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
    });
    loadTodos();
}

</script>
</body>
</html>
